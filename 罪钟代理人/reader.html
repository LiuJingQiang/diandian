<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Novel Reader · Jin Lan Cheng Zui</title>
<style>
:root{color-scheme:light;--paper:#fffaf0;--ink:#2c241b;--muted:#8b7863;--line:#e3d4bd;--accent:#7b3f21;--accent2:#b57437}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at top,#fff8e9 0,#f5efe3 38%,#eadbc4 100%);color:var(--ink);font-family:"Songti SC","Noto Serif CJK SC","Source Han Serif SC","Microsoft YaHei",serif;line-height:1.9}.layout{display:grid;grid-template-columns:260px minmax(0,1fr);min-height:100vh}aside{position:sticky;top:0;height:100vh;padding:28px 22px;background:linear-gradient(180deg,#2a2018,#4a2b1d);color:#f8ead2;overflow:auto;box-shadow:8px 0 24px #6d4b3020}.brand{font-size:24px;font-weight:800;letter-spacing:.08em;margin:0 0 8px}.sub{font-size:12px;color:#d8b98f;margin-bottom:24px;line-height:1.6}.toc{display:flex;flex-direction:column;gap:8px}.toc a{color:#f7dfb9;text-decoration:none;border:1px solid #ffffff1f;border-radius:12px;padding:9px 12px;font-size:14px;background:#ffffff0a;transition:.16s}.toc a:hover,.toc a.active{background:#d7995130;border-color:#e6b16d;color:#fff}.meta{margin-top:24px;padding-top:18px;border-top:1px solid #ffffff22;font-size:12px;color:#cdb393}main{padding:44px 24px 80px}.reader{max-width:820px;margin:0 auto;background:var(--paper);border:1px solid var(--line);border-radius:22px;padding:42px clamp(22px,5vw,72px);box-shadow:0 20px 60px #6d4b3024}.topline{font-size:13px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px}h1{font-size:38px;line-height:1.25;margin:0 0 10px;color:#24180f;letter-spacing:.04em}.intro{font-size:15px;color:var(--muted);margin:0 0 34px;border-left:4px solid var(--accent2);padding-left:14px}.tools{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}button{border:1px solid var(--line);background:#fff7e8;color:var(--accent);border-radius:999px;padding:8px 14px;cursor:pointer;font-size:14px;font-family:inherit}button:hover{border-color:var(--accent2);background:#fff1d6}article{padding:30px 0;border-top:1px solid var(--line)}article:first-of-type{border-top:0}article h2{font-size:28px;line-height:1.35;margin:0 0 22px;color:#321c10;letter-spacing:.03em}article p{font-size:19px;margin:0 0 1.05em;text-align:justify;word-break:break-word}.loading,.error{padding:28px;border:1px dashed var(--line);border-radius:14px;color:var(--muted);background:#fff7e8}.footer{margin-top:38px;color:var(--muted);font-size:13px;text-align:center}body.dark{--paper:#1d1a17;--ink:#eadfce;--muted:#aa9985;--line:#3a3027;--accent:#e2aa65;--accent2:#c6803a;background:radial-gradient(circle at top,#2b211b 0,#141210 48%,#0c0b0a 100%)}body.dark .reader{box-shadow:0 20px 70px #0008}body.dark button{background:#2b241e;color:#efc48b;border-color:#4a3a2f}@media (max-width:860px){.layout{display:block}aside{position:relative;height:auto;padding:22px}.toc{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}main{padding:22px 12px 60px}.reader{border-radius:16px;padding:28px 18px}h1{font-size:31px}article h2{font-size:24px}article p{font-size:18px}}
</style>
</head>
<body>
<div class="layout">
<aside>
  <div class="brand">Jin Lan Cheng Zui</div>
  <div class="sub">Plain prose reader.<br>No game engine. No interactive mode.</div>
  <nav class="toc" id="toc"></nav>
  <div class="meta">Run local server:<br><code>python3 -m http.server 8787</code></div>
</aside>
<main>
  <section class="reader">
    <div class="topline">Novel Reader</div>
    <h1>我在烬岚城替人承罪</h1>
    <p class="intro">烬岚城鸣钟司代书季暮舟为了保住檐灯巷三百户人的命，代替被押来的白铃认下私鸣灾钟之罪，从此走上一条替人承罪、夺取钟权、替灰檐区翻案的路。</p>
    <div class="tools">
      <button type="button" id="toggleTheme">Dark Mode</button>
      <button type="button" id="fontDown">Font -</button>
      <button type="button" id="fontUp">Font +</button>
      <button type="button" id="backTop">Back To Top</button>
    </div>
    <div id="content" class="loading">Loading chapters.</div>
    <div class="footer">Chapter data path: <code>正文/第001章.md → 第020章.md</code></div>
  </section>
</main>
</div>
<script>
const chapters = [
  { title: 'Chapter 001 · 三日后的焚街案卷', file: '正文/第001章.md' },
  { title: 'Chapter 002 · 代理认罪状', file: '正文/第002章.md' },
  { title: 'Chapter 003 · 三息之内', file: '正文/第003章.md' },
  { title: 'Chapter 004 · 檐灯巷不能烧', file: '正文/第004章.md' },
  { title: 'Chapter 005 · 黑市医师', file: '正文/第005章.md' },
  { title: 'Chapter 006 · 旧钟楼藏契', file: '正文/第006章.md' },
  { title: 'Chapter 007 · 第二个名字', file: '正文/第007章.md' },
  { title: 'Chapter 008 · 活价药包', file: '正文/第008章.md' },
  { title: 'Chapter 009 · 替她承罪', file: '正文/第009章.md' },
  { title: 'Chapter 010 · 雾眼开', file: '正文/第010章.md' },
  { title: 'Chapter 011 · 西市井口', file: '正文/第011章.md' },
  { title: 'Chapter 012 · 账本不在井下', file: '正文/第012章.md' },
  { title: 'Chapter 013 · 封巷令', file: '正文/第013章.md' },
  { title: 'Chapter 014 · 街坊作证', file: '正文/第014章.md' },
  { title: 'Chapter 015 · 白铃敲钟', file: '正文/第015章.md' },
  { title: 'Chapter 016 · 炉商账房', file: '正文/第016章.md' },
  { title: 'Chapter 017 · 旧钟楼审夜', file: '正文/第017章.md' },
  { title: 'Chapter 018 · 二十年前的名字', file: '正文/第018章.md' },
  { title: 'Chapter 019 · 代理复核开庭', file: '正文/第019章.md' },
  { title: 'Chapter 020 · 永久代理人', file: '正文/第020章.md' }
];
const content = document.getElementById('content');
const toc = document.getElementById('toc');
function escapeHtml(text){return text.replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));}
function renderMarkdown(md, fallbackTitle, index){
  const lines = md.replace(/\r\n/g,'\n').split('\n');
  let title = fallbackTitle;
  if(lines[0] && lines[0].startsWith('#')) title = lines.shift().replace(/^#+\s*/, '').trim() || fallbackTitle;
  const paragraphs = lines.map(s => s.trim()).filter(Boolean).map(p => `<p>${escapeHtml(p)}</p>`).join('\n');
  return `<article id="chapter-${index+1}"><h2>${escapeHtml(title)}</h2>${paragraphs}</article>`;
}
async function load(){
  toc.innerHTML = chapters.map((ch,i)=>`<a href="#chapter-${i+1}">${ch.title}</a>`).join('');
  try{
    const parts = await Promise.all(chapters.map(async (ch,i)=>{
      const res = await fetch(ch.file);
      if(!res.ok) throw new Error(`${ch.file} failed to load`);
      return renderMarkdown(await res.text(), ch.title, i);
    }));
    content.className = '';
    content.innerHTML = parts.join('\n');
  }catch(err){
    content.className = 'error';
    content.innerHTML = `Failed to load chapters: ${escapeHtml(err.message)}<br>Run <code>python3 -m http.server 8787</code> in the project root, then open <code>http://127.0.0.1:8787/reader.html</code>.`;
  }
}
document.getElementById('toggleTheme').onclick = () => document.body.classList.toggle('dark');
document.getElementById('fontUp').onclick = () => document.documentElement.style.fontSize = ((parseFloat(getComputedStyle(document.documentElement).fontSize)||16)+1)+'px';
document.getElementById('fontDown').onclick = () => document.documentElement.style.fontSize = Math.max(14,(parseFloat(getComputedStyle(document.documentElement).fontSize)||16)-1)+'px';
document.getElementById('backTop').onclick = () => scrollTo({top:0,behavior:'smooth'});
addEventListener('scroll', () => {
  const links = [...toc.querySelectorAll('a')];
  const current = chapters.map((_,i)=>document.getElementById(`chapter-${i+1}`)).filter(Boolean).reverse().find(el => el.getBoundingClientRect().top < 140);
  links.forEach(a => a.classList.toggle('active', current && a.getAttribute('href') === `#${current.id}`));
}, {passive:true});
load();
</script>
</body>
</html>
